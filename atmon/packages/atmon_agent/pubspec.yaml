name: atmon_agent
description: Dart CLI agent that samples Linux/macOS host metrics and publishes them via AtCollection<T>.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  atmon_agent:

dependencies:
  args: ^2.6.0
  meta: ^1.16.0
  at_client: ^3.12.0
  at_commons: ^5.7.0
  at_utils: ^3.2.0
  at_cli_commons: ^2.1.0
  atmon_models:
    path: ../atmon_models

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
